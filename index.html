<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感石碑 - Stone Edition Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: {
                            50: '#f8f8f7', 100: '#f1f1ee', 200: '#e2e2dc', 300: '#d0d0c5',
                            400: '#b8b8a9', 500: '#a2a28f', 600: '#8e8e79', 700: '#777765',
                            800: '#616153', 900: '#505045',
                        }
                    }
                }
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'inspo-vault-pro';
        
        // 优先从本地存储读取 API Key，方便 GitHub 部署后设置
        let apiKey = localStorage.getItem('GEMINI_API_KEY') || ""; 

        let currentUser = null;
        let allInspirations = [];
        let autoTags = [];
        const TAG_POOL = ["破碎感", "清冷", "赛博", "日常", "高对比", "电影感", "温暖", "工业", "留白", "梦幻"];

        const hexToHsl = (hex) => {
            let r = parseInt(hex.slice(1,3), 16) / 255;
            let g = parseInt(hex.slice(3,5), 16) / 255;
            let b = parseInt(hex.slice(5,7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max == min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) loadInspirations();
            else initAuth();
        });

        function loadInspirations() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'inspirations'));
            onSnapshot(q, (snapshot) => {
                allInspirations = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderList(allInspirations);
            });
        }

        window.saveInspo = async () => {
            if (!currentUser) return;
            if (autoTags.length === 0) return alert("AI 尚未完成标签研磨，请稍候...");
            
            const analysis = document.getElementById('analysisOutput').innerHTML;
            const preview = document.getElementById('previewImg').src;
            const btn = document.getElementById('saveBtn');
            
            btn.disabled = true;
            btn.innerText = "正在刻入石碑...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inspirations'), {
                    imageUrl: preview,
                    analysis: analysis,
                    tags: autoTags,
                    timestamp: serverTimestamp(),
                    userId: currentUser.uid
                });
                resetUI();
            } catch (e) { alert("同步失败，请检查网络"); }
            finally { btn.disabled = false; btn.innerText = "确认拓印"; }
        };

        window.renderList = (data) => {
            const list = document.getElementById('inspoList');
            if (data.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                list.innerHTML = '';
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            list.innerHTML = data.map(item => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden border border-stone-200 mb-10 shadow-sm transition-all hover:shadow-lg">
                    <img src="${item.imageUrl}" class="w-full h-auto">
                    <div class="p-8">
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${(item.tags || []).map(t => `<span class="text-[9px] font-bold text-stone-400 bg-stone-50 px-2.5 py-1 rounded-lg uppercase tracking-widest">#${t}</span>`).join('')}
                        </div>
                        <div class="text-sm text-stone-600 leading-relaxed font-light">${item.analysis}</div>
                    </div>
                </div>
            `).join('');
        };

        // --- API 设置逻辑 ---
        window.toggleConfig = () => {
            const modal = document.getElementById('configModal');
            document.getElementById('apiKeyInput').value = localStorage.getItem('GEMINI_API_KEY') || "";
            modal.classList.toggle('hidden');
        };

        window.saveConfig = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('GEMINI_API_KEY', key);
            apiKey = key;
            alert("API 密钥已更新");
            toggleConfig();
        };

        // --- 漂流瓶逻辑 ---
        window.shakeBottle = () => {
            if (allInspirations.length === 0) return alert("石碑尚空，请先拓印一些灵感");
            
            const btn = document.getElementById('bottleTrigger');
            btn.classList.add('animate-bounce');
            
            setTimeout(() => {
                btn.classList.remove('animate-bounce');
                const shuffled = [...TAG_POOL].sort(() => 0.5 - Math.random());
                const combo = shuffled.slice(0, 2);
                
                const matches = allInspirations.filter(item => 
                    item.tags.some(t => combo.includes(t))
                );

                const modal = document.getElementById('bottleModal');
                const title = document.getElementById('bottleTitle');
                const body = document.getElementById('bottleBody');
                
                title.innerText = `漂流瓶碰撞：#${combo[0]} & #${combo[1]}`;
                modal.classList.remove('hidden');

                if (matches.length === 0) {
                    body.innerHTML = `<div class="py-20 text-center text-stone-300 italic text-sm">此标签组合尚未在石碑中出现...</div>`;
                } else {
                    body.innerHTML = `
                        <div class="grid grid-cols-2 gap-4">
                            ${matches.slice(0, 4).map(m => `
                                <img src="${m.imageUrl}" class="w-full aspect-square object-cover rounded-3xl shadow-sm border border-stone-100">
                            `).join('')}
                        </div>
                        <p class="text-[10px] text-center text-stone-400 mt-6 tracking-widest uppercase italic">找到 ${matches.length} 个近似灵感碎片</p>
                    `;
                }
            }, 600);
        };

        window.closeModal = () => {
            document.getElementById('bottleModal').classList.add('hidden');
            document.getElementById('configModal').classList.add('hidden');
        }

        // --- 色环逻辑 ---
        window.toggleColorWheel = () => {
            const panel = document.getElementById('colorPanel');
            panel.classList.toggle('translate-x-full');
            panel.classList.toggle('opacity-0');
        };

        window.matchColorByWheel = (e) => {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width/2;
            const y = e.clientY - rect.top - rect.height/2;
            let angle = Math.atan2(y, x) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;

            const filtered = allInspirations.filter(item => {
                const hexMatches = item.analysis.match(/#[A-Fa-f0-9]{6}/g) || [];
                return hexMatches.some(hex => {
                    const [h] = hexToHsl(hex);
                    return Math.abs(h - angle) < 25 || Math.abs(h - angle) > 335;
                });
            });

            renderList(filtered);
            const info = document.getElementById('searchInfo');
            info.innerHTML = `<span>色相筛选：${Math.round(angle)}°</span> <button onclick="resetSearch()" class="font-bold underline ml-2">重置</button>`;
            info.classList.remove('hidden');
            document.getElementById('wheelIndicator').style.transform = `rotate(${angle - 90}deg)`;
        };

        window.resetSearch = () => {
            renderList(allInspirations);
            document.getElementById('searchInfo').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        };

        window.handleTextSearch = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allInspirations.filter(item => 
                item.analysis.toLowerCase().includes(term) || 
                item.tags.some(t => t.toLowerCase().includes(term))
            );
            renderList(filtered);
        };

        window.analyzeImage = async (base64Data) => {
            if (!apiKey) {
                alert("未检测到 API Key，请在右下角设置中配置。");
                toggleConfig();
                return;
            }
            const output = document.getElementById('analysisOutput');
            const tagContainer = document.getElementById('tagAutoDisplay');
            const loading = document.getElementById('loadingIndicator');
            loading.classList.remove('hidden');

            const prompt = `你是一位极简主义艺术评论家。请：
            1. 从[${TAG_POOL.join(',')}]中严格挑选3个标签。
            2. 给出5个主要色彩的#hex。
            3. 用一段话分析画面构图与情感（40字内）。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }] }]
                    })
                });
                const result = await response.json();
                
                if (result.error) throw new Error(result.error.message);

                const fullText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                
                autoTags = TAG_POOL.filter(t => fullText.includes(t)).slice(0, 3);
                tagContainer.innerHTML = autoTags.map(t => `<span class="bg-stone-900 text-white text-[10px] px-3 py-1 rounded-full animate-pulse">#${t}</span>`).join('');
                
                const hexRegex = /#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})/g;
                output.innerHTML = fullText.replace(hexRegex, (match) => {
                    return `<span class="inline-flex items-center gap-1 bg-stone-100 px-1.5 py-0.5 rounded mr-1">
                                <span class="w-2 h-2 rounded-full" style="background-color: ${match}"></span>
                                <code class="text-[10px]">${match}</code>
                            </span>`;
                }).replace(/\n/g, '<br>');
            } catch (err) { 
                output.innerText = "AI 研磨失败：" + err.message; 
            }
            finally { loading.classList.add('hidden'); }
        };

        window.handleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('previewImg').src = ev.target.result;
                document.getElementById('previewContainer').classList.remove('hidden');
                analyzeImage(ev.target.result);
            };
            reader.readAsDataURL(file);
        };

        window.resetUI = () => {
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('previewImg').src = "";
            document.getElementById('tagAutoDisplay').innerHTML = '';
            document.getElementById('analysisOutput').innerText = "等待研磨...";
            autoTags = [];
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400&display=swap');
        body { background-color: #f8f8f7; color: #505045; font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; }
        .serif-title { font-family: 'Noto Serif SC', serif; }
        
        .color-wheel {
            width: 160px; height: 160px;
            border-radius: 50%;
            background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
            cursor: crosshair;
            position: relative;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #wheelIndicator {
            position: absolute; top: 50%; left: 50%;
            width: 50%; height: 2px;
            background: rgba(255,255,255,0.8);
            transform-origin: left;
            pointer-events: none;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e2dc; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-stone-200">

    <div class="max-w-md mx-auto px-6 pt-24 pb-48">
        <!-- Header -->
        <header class="mb-14">
            <h1 class="text-4xl font-light text-stone-900 serif-title tracking-tighter">灵感石碑</h1>
            <p class="text-[9px] text-stone-400 mt-3 tracking-[0.4em] uppercase font-bold">Stone Edition Pro / Inspo Flask</p>
        </header>

        <!-- Search -->
        <div class="space-y-4 mb-12">
            <div id="searchInfo" class="hidden bg-stone-900 text-stone-50 text-[10px] px-6 py-4 rounded-2xl flex justify-between items-center tracking-widest uppercase"></div>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-stone-300 text-sm"></i>
                <input type="text" id="searchInput" oninput="handleTextSearch(event)" placeholder="搜索关键词或标签..." class="w-full bg-white border border-stone-200 rounded-3xl py-5 pl-14 pr-6 text-sm outline-none focus:ring-2 focus:ring-stone-200 transition-all">
            </div>
        </div>

        <!-- Uploader -->
        <div class="mb-20">
            <div class="relative border border-stone-200 bg-white rounded-[3rem] p-12 text-center hover:bg-stone-50 transition-all cursor-pointer shadow-sm">
                <input type="file" accept="image/*" onchange="handleImage(event)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div class="space-y-3">
                    <i class="fa-solid fa-plus text-stone-400"></i>
                    <p class="text-[10px] text-stone-400 tracking-[0.2em] uppercase font-black">拓印新碎片</p>
                </div>
            </div>

            <div id="previewContainer" class="hidden mt-10 space-y-8">
                <div class="rounded-[2.5rem] overflow-hidden shadow-2xl shadow-stone-200/50 border border-white">
                    <img id="previewImg" src="" class="w-full h-auto">
                </div>
                
                <div class="bg-white rounded-[2rem] p-8 border border-stone-100 space-y-6">
                    <div id="tagAutoDisplay" class="flex flex-wrap gap-2.5 min-h-[30px]"></div>
                    <div class="relative min-h-[80px]">
                        <div id="loadingIndicator" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center rounded-xl z-20">
                            <span class="text-[10px] tracking-widest text-stone-500 animate-pulse">正在研磨视觉基因...</span>
                        </div>
                        <div id="analysisOutput" class="text-sm font-light text-stone-500 leading-relaxed italic">等待画面载入...</div>
                    </div>
                    <button id="saveBtn" onclick="saveInspo()" class="w-full bg-stone-900 text-white text-xs font-bold py-6 rounded-2xl hover:bg-stone-800 transition-all uppercase tracking-widest shadow-xl shadow-stone-900/10">
                        确认并存入石碑库
                    </button>
                </div>
            </div>
        </div>

        <!-- Feed -->
        <div>
            <div class="flex items-center gap-4 mb-10">
                <span class="text-[9px] font-black text-stone-300 uppercase tracking-[0.5em]">Collections</span>
                <div class="h-px flex-1 bg-stone-200/40"></div>
            </div>
            <div id="emptyState" class="hidden py-32 text-center opacity-10"><i class="fa-solid fa-mountain-sun text-4xl mb-4"></i></div>
            <div id="inspoList"></div>
        </div>
    </div>

    <!-- Side Tools -->
    <div class="fixed right-6 bottom-32 z-[100] flex flex-col items-end gap-5">
        <!-- Color Panel -->
        <div id="colorPanel" class="translate-x-full opacity-0 transition-all duration-500 bg-white/90 backdrop-blur-2xl p-8 rounded-[3rem] border border-white shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">以色寻图</span>
                <button onclick="toggleColorWheel()" class="text-stone-300 hover:text-stone-900"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="color-wheel" onclick="matchColorByWheel(event)">
                <div id="wheelIndicator" style="transform: rotate(-90deg)"></div>
            </div>
        </div>
        
        <!-- Toggle Buttons -->
        <button onclick="toggleConfig()" class="w-14 h-14 bg-stone-100 border border-stone-200 text-stone-400 rounded-full shadow-xl flex items-center justify-center hover:text-stone-900 transition-all">
            <i class="fa-solid fa-key text-xs"></i>
        </button>
        <button id="bottleTrigger" onclick="shakeBottle()" class="w-14 h-14 bg-stone-900 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
            <i class="fa-solid fa-flask-vial text-sm"></i>
        </button>
        <button onclick="toggleColorWheel()" class="w-14 h-14 bg-white border border-stone-200 text-stone-900 rounded-full shadow-xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
            <i class="fa-solid fa-palette text-sm"></i>
        </button>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-72 bg-stone-900/95 backdrop-blur-2xl p-1.5 rounded-full flex justify-between items-center shadow-2xl z-[100] border border-white/10">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="w-12 h-12 rounded-full bg-white text-stone-900 flex items-center justify-center shadow-lg"><i class="fa-solid fa-plus text-xs"></i></button>
        <button onclick="resetSearch()" class="w-12 h-12 rounded-full text-stone-400 flex items-center justify-center hover:text-white"><i class="fa-solid fa-house text-xs"></i></button>
        <button onclick="toggleConfig()" class="w-12 h-12 rounded-full text-stone-400 flex items-center justify-center hover:text-white"><i class="fa-solid fa-gear text-xs"></i></button>
    </nav>

    <!-- Modal Containers -->
    <div id="bottleModal" class="fixed inset-0 z-[200] hidden bg-stone-900/40 backdrop-blur-md flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-fade-in border border-white">
            <div class="flex justify-between items-center mb-8">
                <h3 id="bottleTitle" class="text-[10px] font-bold text-stone-900 uppercase tracking-widest">漂流瓶碰撞</h3>
                <button onclick="closeModal()" class="text-stone-300 hover:text-stone-900"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="bottleBody" class="custom-scrollbar max-h-[50vh] overflow-y-auto"></div>
            <button onclick="shakeBottle()" class="w-full mt-8 bg-stone-50 py-5 rounded-2xl text-[10px] font-bold text-stone-400 hover:bg-stone-100 hover:text-stone-900 transition-all uppercase tracking-widest">再次摇晃</button>
        </div>
    </div>

    <!-- API Config Modal -->
    <div id="configModal" class="fixed inset-0 z-[200] hidden bg-stone-900/60 backdrop-blur-md flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-bold text-stone-900 uppercase tracking-widest">AI 配置中心</h3>
                <button onclick="toggleConfig()" class="text-stone-300 hover:text-stone-900"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <p class="text-xs text-stone-400 mb-6 leading-relaxed">请输入您的 Gemini API Key。此密钥仅保存在您的浏览器本地，用于驱动自动打标与审美分析功能。</p>
            <input type="password" id="apiKeyInput" placeholder="输入 API Key..." class="w-full bg-stone-50 border border-stone-200 rounded-2xl py-4 px-6 text-sm mb-6 outline-none focus:ring-2 focus:ring-stone-200 transition-all">
            <button onclick="saveConfig()" class="w-full bg-stone-900 text-white text-[11px] font-bold py-5 rounded-2xl uppercase tracking-widest shadow-lg">保存并更新</button>
        </div>
    </div>

</body>
</html>
