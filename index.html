<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感石碑 - Stone Edition Pro v4.0 (Cloud Storage)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-storage.js";

        // Firebase 初始化
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'inspiration-stone-v4';

        // 挂载核心对象到全局以便跨作用域使用
        window.fb = { db, auth, storage, appId, collection, addDoc, onSnapshot, query, orderBy, ref, uploadString, getDownloadURL };
        window.currentUser = null;

        // 严格遵循 RULE 3: 先登录，后操作
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };

        // 监听登录状态
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                console.log("Authenticated as:", user.uid);
                // 登录成功后再启动监听逻辑
                window.dispatchEvent(new CustomEvent('auth-ready'));
            }
        });

        initAuth();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400&display=swap');
        body { background-color: #f8f8f7; color: #44443c; font-family: 'Noto Sans SC', sans-serif; }
        .serif-title { font-family: 'Noto Serif SC', serif; }
        .stone-card { background: white; border: 1px solid #eee; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .stone-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .loading-shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-2xl mx-auto px-6 pt-16">
        <header class="mb-12 flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-light text-stone-900 serif-title tracking-tight">灵感云石碑</h1>
                <p class="text-[10px] text-stone-400 mt-2 tracking-[0.3em] uppercase font-bold">Cloud Sync / Multi-Device support</p>
            </div>
            <div class="flex gap-3">
                <button id="keyBtn" class="p-3 rounded-2xl bg-white border border-stone-100 text-stone-400 hover:text-stone-900 shadow-sm transition-all">
                    <i class="fa-solid fa-key text-xs"></i>
                </button>
            </div>
        </header>

        <!-- 云端状态栏 -->
        <div class="mb-8 p-4 bg-stone-900 rounded-3xl text-white flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-3">
                <div id="statusDot" class="w-2 h-2 bg-stone-500 rounded-full"></div>
                <span id="statusText" class="text-[10px] font-bold uppercase tracking-widest">正在连接云端...</span>
            </div>
            <button id="driftBtn" class="text-[10px] bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-all">捞取灵感碎片</button>
        </div>

        <!-- 上传区域 -->
        <div class="mb-12">
            <div id="dropZone" class="relative border-2 border-stone-200 border-dashed bg-white rounded-[2.5rem] p-12 text-center hover:border-stone-400 transition-all cursor-pointer group shadow-sm">
                <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div class="space-y-3 pointer-events-none">
                    <i class="fa-solid fa-cloud-arrow-up text-2xl text-stone-300 group-hover:text-stone-600 transition-colors"></i>
                    <p class="text-[10px] text-stone-400 uppercase font-black tracking-widest">点击或拖拽上传高画质素材</p>
                </div>
            </div>

            <!-- 分析与预览 -->
            <div id="previewContainer" class="hidden mt-8 space-y-4">
                <div class="rounded-[2rem] overflow-hidden shadow-2xl">
                    <img id="previewImg" src="" class="w-full h-auto">
                </div>
                <div class="bg-white rounded-[2rem] p-8 border border-stone-100">
                    <div id="loadingIndicator" class="hidden py-4 text-center">
                        <i class="fa-solid fa-circle-notch animate-spin text-stone-900 mb-2"></i>
                        <p class="text-[9px] font-bold text-stone-400 uppercase tracking-[0.2em]">正在跨维度分析并同步云端</p>
                    </div>
                    <div id="analysisOutput" class="text-sm text-stone-600 leading-relaxed"></div>
                    <div class="mt-6 flex gap-3">
                        <button id="uploadBtn" class="flex-1 bg-stone-900 text-white text-[10px] font-bold py-4 rounded-2xl hover:shadow-lg transition-all uppercase tracking-widest">同步至云端石碑</button>
                        <button id="cancelBtn" class="px-6 bg-stone-100 text-stone-400 rounded-2xl hover:bg-stone-200 transition-all text-xs">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 瀑布流列表 -->
        <div id="cloudList" class="grid grid-cols-1 gap-8">
            <div class="loading-shimmer h-64 rounded-[2.5rem]"></div>
            <div class="loading-shimmer h-64 rounded-[2.5rem]"></div>
        </div>
    </div>

    <!-- 配置模态框 -->
    <div id="configModal" class="fixed inset-0 z-[500] hidden bg-stone-900/40 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-[10px] font-bold text-stone-900 mb-6 uppercase tracking-widest">Gemini API 配置</h3>
            <input type="password" id="apiKeyInput" placeholder="输入 API Key" class="w-full bg-stone-50 border border-stone-200 rounded-xl py-4 px-5 text-xs mb-6 outline-none focus:border-stone-900">
            <button id="saveConfigBtn" class="w-full bg-stone-900 text-white py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest">保存</button>
        </div>
    </div>

    <script type="module">
        let currentFileData = null;
        let currentAnalysis = null;

        // 等待 Auth 完成后再启动业务逻辑
        window.addEventListener('auth-ready', () => {
            updateStatusUI(true);
            initApp();
            listenToCloud();
        });

        function updateStatusUI(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (connected) {
                dot.classList.replace('bg-stone-500', 'bg-emerald-400');
                dot.classList.add('animate-pulse');
                text.innerText = "云端同步已开启";
            }
        }

        function initApp() {
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentFileData = ev.target.result;
                    document.getElementById('previewImg').src = currentFileData;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    runAnalysis(currentFileData);
                };
                reader.readAsDataURL(file);
            };

            document.getElementById('keyBtn').onclick = () => {
                document.getElementById('configModal').classList.remove('hidden');
                document.getElementById('apiKeyInput').value = localStorage.getItem('GEMINI_API_KEY') || "";
            };

            document.getElementById('saveConfigBtn').onclick = () => {
                localStorage.setItem('GEMINI_API_KEY', document.getElementById('apiKeyInput').value.trim());
                document.getElementById('configModal').classList.add('hidden');
            };

            document.getElementById('uploadBtn').onclick = uploadToCloud;
            document.getElementById('cancelBtn').onclick = () => {
                document.getElementById('previewContainer').classList.add('hidden');
                currentFileData = null;
                currentAnalysis = null;
            };
        }

        async function runAnalysis(base64) {
            const key = localStorage.getItem('GEMINI_API_KEY');
            if (!key) return alert("请点击右上角配置 API Key");

            const output = document.getElementById('analysisOutput');
            const loader = document.getElementById('loadingIndicator');
            loader.classList.remove('hidden');
            output.innerHTML = "";

            try {
                const prompt = `你是一位极简主义艺术评论家。请分析图中的视觉情感，返回JSON：{"tags":["标签"],"desc":"一句话深刻描述"}`;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64.split(',')[1] } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const res = await resp.json();
                if (res.error) throw new Error(res.error.message);
                
                currentAnalysis = JSON.parse(res.candidates[0].content.parts[0].text);
                output.innerHTML = `
                    <div class="flex flex-wrap gap-2 mb-3">
                        ${currentAnalysis.tags.map(t => `<span class="bg-stone-100 px-3 py-1 rounded-full text-[10px] font-bold text-stone-500">#${t}</span>`).join('')}
                    </div>
                    <p class="serif-title italic text-stone-800">“${currentAnalysis.desc}”</p>
                `;
            } catch (e) {
                output.innerHTML = `<p class="text-red-400 text-[10px]">分析失败：${e.message}</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function uploadToCloud() {
            if (!currentFileData || !currentAnalysis || !window.currentUser) {
                alert("未完成分析或登录状态丢失，请稍后");
                return;
            }
            
            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerText;
            btn.innerText = "同步中...";
            btn.disabled = true;

            try {
                const { storage, db, appId, ref, uploadString, getDownloadURL, collection, addDoc } = window.fb;
                
                // 1. 上传图片文件 (Storage)
                const storagePath = `artifacts/${appId}/images/${Date.now()}.png`;
                const storageRef = ref(storage, storagePath);
                await uploadString(storageRef, currentFileData, 'data_url');
                const downloadURL = await getDownloadURL(storageRef);

                // 2. 存入元数据 (Firestore)
                const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'inspo_stones');
                await addDoc(dataCol, {
                    imageUrl: downloadURL,
                    tags: currentAnalysis.tags,
                    description: currentAnalysis.desc,
                    creator: window.currentUser.uid,
                    createdAt: Date.now()
                });

                document.getElementById('previewContainer').classList.add('hidden');
                currentFileData = null;
                currentAnalysis = null;
            } catch (e) {
                console.error("Upload Error:", e);
                alert("云端同步失败: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function listenToCloud() {
            if (!window.currentUser) return;

            const { db, appId, collection, onSnapshot } = window.fb;
            const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'inspo_stones');
            
            // 实时监听
            onSnapshot(dataCol, (snapshot) => {
                const list = document.getElementById('cloudList');
                if (snapshot.empty) {
                    list.innerHTML = `<div class="py-20 text-center text-stone-300 text-xs uppercase tracking-widest font-bold">尚无云端印记</div>`;
                    return;
                }

                // 规则 2: 内存中排序
                const docs = snapshot.docs.map(d => d.data()).sort((a, b) => b.createdAt - a.createdAt);

                list.innerHTML = docs.map(item => `
                    <div class="stone-card rounded-[2.5rem] overflow-hidden group">
                        <div class="relative overflow-hidden aspect-[4/3] bg-stone-100">
                            <img src="${item.imageUrl}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
                        </div>
                        <div class="p-8">
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${item.tags.map(t => `<span class="text-[9px] font-black uppercase text-stone-400 tracking-tighter">#${t}</span>`).join('')}
                            </div>
                            <p class="text-xs text-stone-600 leading-relaxed serif-title">${item.description}</p>
                            <div class="mt-6 pt-6 border-t border-stone-50 flex justify-between items-center">
                                <span class="text-[8px] text-stone-300 font-bold uppercase">Cloud Trace: ${item.creator.slice(0, 8)}</span>
                                <i class="fa-solid fa-ellipsis text-stone-200"></i>
                            </div>
                        </div>
                    </div>
                `).join('');
            }, (err) => {
                console.error("Cloud Listen Error:", err);
                document.getElementById('cloudList').innerHTML = `<div class="p-10 text-center text-red-300 text-[10px]">连接权限受阻，请刷新页面</div>`;
            });
        }
    </script>
</body>
</html>
