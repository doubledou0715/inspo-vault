<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感石碑 - Stone Edition Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400&display=swap');
        body { background-color: #f8f8f7; color: #505045; font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; }
        .serif-title { font-family: 'Noto Serif SC', serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .drag-over { border-color: #1c1917 !important; background-color: #f5f5f4 !important; transform: scale(1.02); }
    </style>
</head>
<body class="selection:bg-stone-200 pb-32">

    <div class="max-w-md mx-auto px-6 pt-24">
        <header class="mb-14">
            <h1 class="text-4xl font-light text-stone-900 serif-title tracking-tighter">灵感石碑</h1>
            <p class="text-[9px] text-stone-400 mt-3 tracking-[0.4em] uppercase font-bold">Stone Edition Pro / v3.0 Gemini 3 Preview</p>
        </header>

        <!-- 搜索 -->
        <div class="mb-12 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-stone-300 text-sm"></i>
            <input type="text" id="searchInput" placeholder="搜索关键词..." class="w-full bg-white border border-stone-200 rounded-3xl py-5 pl-14 pr-6 text-sm outline-none focus:ring-2 focus:ring-stone-200 transition-all">
        </div>

        <!-- 上传区域 -->
        <div class="mb-20">
            <div id="dropZone" class="relative border border-stone-200 bg-white rounded-[3rem] p-12 text-center hover:bg-stone-50 transition-all cursor-pointer shadow-sm border-dashed">
                <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div class="space-y-3 pointer-events-none">
                    <i class="fa-solid fa-plus text-stone-400"></i>
                    <p class="text-[10px] text-stone-400 uppercase font-black tracking-widest">点击或拖入碎片</p>
                </div>
            </div>

            <div id="previewContainer" class="hidden mt-10 space-y-6 animate-fade-in">
                <div class="rounded-[2.5rem] overflow-hidden shadow-xl border border-white">
                    <img id="previewImg" src="" class="w-full h-auto">
                </div>
                <div class="bg-white rounded-[2rem] p-8 border border-stone-100 space-y-6">
                    <div id="tagAutoDisplay" class="flex flex-wrap gap-2"></div>
                    <div class="relative min-h-[60px]">
                        <div id="loadingIndicator" class="hidden text-xs text-stone-400 animate-pulse">Gemini 3 正在重构视觉维度...</div>
                        <div id="analysisOutput" class="text-sm font-light text-stone-500 leading-relaxed italic">等待画面载入...</div>
                    </div>
                    <button id="saveBtn" class="w-full bg-stone-900 text-white text-xs font-bold py-6 rounded-2xl hover:bg-stone-800 transition-all uppercase tracking-widest">确认存入本地石碑库</button>
                </div>
            </div>
        </div>

        <div id="emptyState" class="py-32 text-center opacity-10"><i class="fa-solid fa-mountain-sun text-4xl"></i></div>
        <div id="inspoList" class="space-y-8"></div>
    </div>

    <!-- 侧边工具 -->
    <div class="fixed right-6 bottom-32 z-[100] flex flex-col gap-4">
        <button id="keyBtn" class="w-12 h-12 bg-stone-100 text-stone-400 rounded-full flex items-center justify-center shadow-lg hover:text-stone-900">
            <i class="fa-solid fa-key text-xs"></i>
        </button>
    </div>

    <!-- 弹窗 -->
    <div id="configModal" class="fixed inset-0 z-[200] hidden bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-fade-in">
            <h3 class="text-[10px] font-bold text-stone-900 mb-6 uppercase tracking-widest">AI 配置中心</h3>
            <input type="password" id="apiKeyInput" placeholder="粘贴完整的 API Key" class="w-full bg-stone-50 border border-stone-200 rounded-2xl py-4 px-6 text-sm mb-6 outline-none">
            <div class="flex gap-3">
                <button id="closeConfigBtn" class="flex-1 bg-stone-100 text-stone-500 py-4 rounded-xl text-[10px] font-bold uppercase">取消</button>
                <button id="saveConfigBtn" class="flex-1 bg-stone-900 text-white py-4 rounded-xl text-[10px] font-bold uppercase">保存</button>
            </div>
        </div>
    </div>

    <script>
        const TAG_POOL = ["破碎感", "清冷", "赛博", "日常", "高对比", "电影感", "温暖", "工业", "留白", "梦幻"];
        let autoTags = [];

        window.addEventListener('load', () => {
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');

            if(fileInput) fileInput.addEventListener('change', (e) => processFile(e.target.files[0]));
            
            ['dragenter', 'dragover'].forEach(n => dropZone.addEventListener(n, e => { e.preventDefault(); dropZone.classList.add('drag-over'); }));
            ['dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); }));
            dropZone.addEventListener('drop', (e) => { processFile(e.dataTransfer.files[0]); });

            document.getElementById('keyBtn').onclick = () => {
                document.getElementById('configModal').classList.remove('hidden');
                document.getElementById('apiKeyInput').value = localStorage.getItem('GEMINI_API_KEY') || "";
            };
            document.getElementById('closeConfigBtn').onclick = () => document.getElementById('configModal').classList.add('hidden');
            document.getElementById('saveConfigBtn').onclick = () => {
                localStorage.setItem('GEMINI_API_KEY', document.getElementById('apiKeyInput').value.trim());
                document.getElementById('configModal').classList.add('hidden');
            };
            document.getElementById('saveBtn').onclick = saveToLocal;
            document.getElementById('searchInput').oninput = (e) => renderInspoList(e.target.value);
            
            renderInspoList();
        });

        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('previewImg').src = ev.target.result;
                document.getElementById('previewContainer').classList.remove('hidden');
                analyzeImage(ev.target.result);
            };
            reader.readAsDataURL(file);
        }

        async function analyzeImage(base64Data) {
            const key = localStorage.getItem('GEMINI_API_KEY');
            if (!key) return alert("请先在右下角钥匙处设置 API Key");

            const output = document.getElementById('analysisOutput');
            const loading = document.getElementById('loadingIndicator');
            loading.classList.remove('hidden');
            output.innerText = "请求 Gemini 3 Flash 预览版...";

            try {
                // 根据文档更新为 gemini-3-flash-preview
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "作为灵感分析师，请用一段优美的文字（50字内）评价这张图的构图和氛围，并从这些词中选3个标签："+TAG_POOL.join(",") }, 
                            { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }
                        ] }]
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(`${result.error.code}: ${result.error.message}`);
                }

                if (!result.candidates || result.candidates.length === 0) {
                    throw new Error("AI 未返回有效内容，请检查图片内容是否合规。");
                }

                const text = result.candidates[0].content.parts[0].text;
                output.innerText = text;
                autoTags = TAG_POOL.filter(t => text.includes(t));
                document.getElementById('tagAutoDisplay').innerHTML = autoTags.map(t => `<span class="bg-stone-900 text-white text-[10px] px-3 py-1 rounded-full">#${t}</span>`).join('');
            } catch (err) {
                output.innerHTML = `<span class="text-red-500 font-bold">接口异常</span><br><small class="text-[10px] opacity-60">${err.message}</small>`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        function saveToLocal() {
            const data = { id: Date.now(), image: document.getElementById('previewImg').src, tags: autoTags, analysis: document.getElementById('analysisOutput').innerText };
            let list = JSON.parse(localStorage.getItem('my_inspo') || "[]");
            list.unshift(data);
            localStorage.setItem('my_inspo', JSON.stringify(list));
            document.getElementById('previewContainer').classList.add('hidden');
            renderInspoList();
        }

        function renderInspoList(keyword = "") {
            let list = JSON.parse(localStorage.getItem('my_inspo') || "[]");
            if(keyword) {
                list = list.filter(item => item.analysis.includes(keyword) || item.tags.some(t => t.includes(keyword)));
            }
            const container = document.getElementById('inspoList');
            const empty = document.getElementById('emptyState');
            if (list.length > 0) empty.classList.add('hidden');
            else empty.classList.remove('hidden');

            container.innerHTML = list.map(item => `
                <div class="bg-white rounded-[2rem] overflow-hidden border border-stone-100 shadow-sm animate-fade-in group">
                    <div class="relative overflow-hidden">
                        <img src="${item.image}" class="w-full h-auto transition-transform duration-700 group-hover:scale-105">
                        <button onclick="deleteItem(${item.id})" class="absolute top-4 right-4 w-8 h-8 bg-black/20 backdrop-blur-md text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fa-solid fa-xmark text-xs"></i>
                        </button>
                    </div>
                    <div class="p-6">
                        <div class="flex flex-wrap gap-2 mb-4">${item.tags.map(t => `<span class="text-[10px] text-stone-400 font-bold uppercase tracking-widest">#${t}</span>`).join('')}</div>
                        <div class="text-xs text-stone-500 font-light leading-relaxed">${item.analysis}</div>
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            if(!confirm("确定要移除这个灵感吗？")) return;
            let list = JSON.parse(localStorage.getItem('my_inspo') || "[]");
            list = list.filter(i => i.id !== id);
            localStorage.setItem('my_inspo', JSON.stringify(list));
            renderInspoList();
        }
    </script>
</body>
</html>
