<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感石碑 - Stone Edition Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: {
                            50: '#f8f8f7', 100: '#f1f1ee', 200: '#e2e2dc', 300: '#d0d0c5',
                            400: '#b8b8a9', 500: '#a2a28f', 600: '#8e8e79', 700: '#777765',
                            800: '#616153', 900: '#505045',
                        }
                    }
                }
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 安全的配置读取逻辑 ---
        let firebaseConfig = {};
        try {
            // 如果在我们的预览环境，使用系统配置
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            } else {
                // 如果在 GitHub 环境，请在此处手动填入你的 Firebase 配置 (或保持空以仅使用本地预览)
                // 注意：如果你没有填入真实的 Firebase 配置，保存功能将无法使用，但 UI 按钮不会再卡死
                console.warn("未检测到 Firebase 配置。");
            }
        } catch (e) {
            console.error("Firebase 配置解析失败");
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'inspo-vault-pro';
        let db, auth;
        
        // 只有配置存在才初始化 Firebase
        if (firebaseConfig.apiKey) {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) { console.error("Auth 失败", e); }
            };

            onAuthStateChanged(auth, (user) => {
                window.currentUser = user;
                if (user) loadInspirations();
                else initAuth();
            });
        }

        let apiKey = localStorage.getItem('GEMINI_API_KEY') || ""; 
        window.allInspirations = [];
        let autoTags = [];
        const TAG_POOL = ["破碎感", "清冷", "赛博", "日常", "高对比", "电影感", "温暖", "工业", "留白", "梦幻"];

        function loadInspirations() {
            if (!db) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'inspirations'));
            onSnapshot(q, (snapshot) => {
                window.allInspirations = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderList(window.allInspirations);
            }, (err) => console.error("读取失败", err));
        }

        // 挂载到全局
        window.saveInspo = async () => {
            if (!db || !window.currentUser) return alert("数据库未配置或未登录");
            if (autoTags.length === 0) return alert("AI 尚未完成标签研磨...");
            
            const analysis = document.getElementById('analysisOutput').innerHTML;
            const preview = document.getElementById('previewImg').src;
            const btn = document.getElementById('saveBtn');
            
            btn.disabled = true;
            btn.innerText = "正在刻入石碑...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inspirations'), {
                    imageUrl: preview,
                    analysis: analysis,
                    tags: autoTags,
                    timestamp: serverTimestamp(),
                    userId: window.currentUser.uid
                });
                resetUI();
            } catch (e) { alert("同步失败"); }
            finally { btn.disabled = false; btn.innerText = "确认拓印"; }
        };

        window.renderList = (data) => {
            const list = document.getElementById('inspoList');
            if (!list) return;
            if (data.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                list.innerHTML = '';
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            list.innerHTML = data.map(item => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden border border-stone-200 mb-10 shadow-sm transition-all hover:shadow-lg">
                    <img src="${item.imageUrl}" class="w-full h-auto">
                    <div class="p-8">
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${(item.tags || []).map(t => `<span class="text-[9px] font-bold text-stone-400 bg-stone-50 px-2.5 py-1 rounded-lg uppercase tracking-widest">#${t}</span>`).join('')}
                        </div>
                        <div class="text-sm text-stone-600 leading-relaxed font-light">${item.analysis}</div>
                    </div>
                </div>
            `).join('');
        };

        window.toggleConfig = () => {
            document.getElementById('configModal').classList.toggle('hidden');
            document.getElementById('apiKeyInput').value = localStorage.getItem('GEMINI_API_KEY') || "";
        };

        window.saveConfig = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('GEMINI_API_KEY', key);
            apiKey = key;
            alert("API 密钥已更新");
            window.toggleConfig();
        };

        window.shakeBottle = () => {
            if (window.allInspirations.length === 0) return alert("石碑尚空");
            const btn = document.getElementById('bottleTrigger');
            btn.classList.add('animate-bounce');
            setTimeout(() => {
                btn.classList.remove('animate-bounce');
                const shuffled = [...TAG_POOL].sort(() => 0.5 - Math.random());
                const combo = shuffled.slice(0, 2);
                const matches = window.allInspirations.filter(item => item.tags.some(t => combo.includes(t)));
                const modal = document.getElementById('bottleModal');
                document.getElementById('bottleTitle').innerText = `碰撞：#${combo[0]} & #${combo[1]}`;
                modal.classList.remove('hidden');
                const body = document.getElementById('bottleBody');
                if (matches.length === 0) body.innerHTML = `<div class="py-20 text-center text-stone-300 italic text-sm">暂无组合...</div>`;
                else body.innerHTML = `<div class="grid grid-cols-2 gap-4">${matches.slice(0, 4).map(m => `<img src="${m.imageUrl}" class="w-full aspect-square object-cover rounded-3xl">`).join('')}</div>`;
            }, 600);
        };

        window.closeModal = () => {
            document.getElementById('bottleModal').classList.add('hidden');
            document.getElementById('configModal').classList.add('hidden');
        };

        window.analyzeImage = async (base64Data) => {
            if (!apiKey) { toggleConfig(); return; }
            const output = document.getElementById('analysisOutput');
            const tagContainer = document.getElementById('tagAutoDisplay');
            const loading = document.getElementById('loadingIndicator');
            loading.classList.remove('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "挑3个标签["+TAG_POOL.join(',')+"]，5个颜色#hex，40字内分析构图。" }, { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }] }]
                    })
                });
                const result = await response.json();
                const fullText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                autoTags = TAG_POOL.filter(t => fullText.includes(t)).slice(0, 3);
                tagContainer.innerHTML = autoTags.map(t => `<span class="bg-stone-900 text-white text-[10px] px-3 py-1 rounded-full">#${t}</span>`).join('');
                output.innerHTML = fullText.replace(/#[A-Fa-f0-9]{6}/g, m => `<span class="inline-flex items-center gap-1 bg-stone-100 px-1 py-0.5 rounded mr-1"><span class="w-2 h-2 rounded-full" style="background-color:${m}"></span>${m}</span>`);
            } catch (e) { output.innerText = "AI 错误"; }
            finally { loading.classList.add('hidden'); }
        };

        window.handleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('previewImg').src = ev.target.result;
                document.getElementById('previewContainer').classList.remove('hidden');
                analyzeImage(ev.target.result);
            };
            reader.readAsDataURL(file);
        };

        window.resetUI = () => {
            document.getElementById('previewContainer').classList.add('hidden');
            autoTags = [];
            document.getElementById('tagAutoDisplay').innerHTML = '';
        };

        window.toggleColorWheel = () => {
            const panel = document.getElementById('colorPanel');
            panel.classList.toggle('translate-x-full');
            panel.classList.toggle('opacity-0');
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400&display=swap');
        body { background-color: #f8f8f7; color: #505045; font-family: 'Noto Sans SC', sans-serif; }
        .serif-title { font-family: 'Noto Serif SC', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e2dc; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-stone-200 pb-32">

    <div class="max-w-md mx-auto px-6 pt-24">
        <header class="mb-14">
            <h1 class="text-4xl font-light text-stone-900 serif-title">灵感石碑</h1>
            <p class="text-[9px] text-stone-400 mt-3 tracking-[0.4em] uppercase font-bold">Stone Edition Pro</p>
        </header>

        <div class="mb-12 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-stone-300 text-sm"></i>
            <input type="text" placeholder="搜索关键词..." class="w-full bg-white border border-stone-200 rounded-3xl py-5 pl-14 pr-6 text-sm outline-none">
        </div>

        <div class="mb-20">
            <div class="relative border border-stone-200 bg-white rounded-[3rem] p-12 text-center cursor-pointer">
                <input type="file" accept="image/*" onchange="handleImage(event)" class="absolute inset-0 opacity-0 z-10">
                <div class="space-y-3">
                    <i class="fa-solid fa-plus text-stone-400"></i>
                    <p class="text-[10px] text-stone-400 uppercase font-black">拓印新碎片</p>
                </div>
            </div>

            <div id="previewContainer" class="hidden mt-10 space-y-6">
                <img id="previewImg" class="w-full rounded-[2rem] shadow-xl">
                <div class="bg-white rounded-[2rem] p-6 border border-stone-100">
                    <div id="tagAutoDisplay" class="flex flex-wrap gap-2 mb-4"></div>
                    <div id="loadingIndicator" class="hidden text-xs text-stone-400 animate-pulse mb-4">研磨中...</div>
                    <div id="analysisOutput" class="text-sm font-light text-stone-500 italic mb-6">等待画面载入...</div>
                    <button id="saveBtn" onclick="saveInspo()" class="w-full bg-stone-900 text-white text-xs py-5 rounded-2xl">确认存入石碑</button>
                </div>
            </div>
        </div>

        <div id="emptyState" class="hidden py-32 text-center opacity-10"><i class="fa-solid fa-mountain-sun text-4xl"></i></div>
        <div id="inspoList"></div>
    </div>

    <!-- Side Tools -->
    <div class="fixed right-6 bottom-32 z-[100] flex flex-col gap-4">
        <button onclick="toggleConfig()" class="w-12 h-12 bg-stone-100 text-stone-400 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-key"></i></button>
        <button id="bottleTrigger" onclick="shakeBottle()" class="w-12 h-12 bg-stone-900 text-white rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-flask-vial"></i></button>
    </div>

    <!-- Modals -->
    <div id="bottleModal" class="fixed inset-0 z-[200] hidden bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="bottleTitle" class="text-xs font-bold text-stone-900 uppercase">漂流瓶碰撞</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-stone-300"></i></button>
            </div>
            <div id="bottleBody" class="max-h-[50vh] overflow-y-auto"></div>
        </div>
    </div>

    <div id="configModal" class="fixed inset-0 z-[200] hidden bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8">
            <h3 class="text-xs font-bold text-stone-900 mb-4">AI 配置</h3>
            <input type="password" id="apiKeyInput" placeholder="填入 Gemini API Key" class="w-full bg-stone-50 border border-stone-200 rounded-2xl p-4 text-sm mb-4 outline-none">
            <button onclick="saveConfig()" class="w-full bg-stone-900 text-white py-4 rounded-xl text-xs uppercase">保存</button>
        </div>
    </div>

</body>
</html>
