<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感石碑 - v7.2 稳定修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // 安全获取配置
        let config = {};
        try {
            config = JSON.parse(__firebase_config);
        } catch (e) {
            console.error("Firebase config error:", e);
        }

        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'monolith-v7-stable';

        window.fb = { db, auth, storage, appId, collection, addDoc, onSnapshot, query, orderBy, ref, uploadString, getDownloadURL };
        
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                window.dispatchEvent(new CustomEvent('app-ready'));
            }
        });

        initAuth();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&family=Noto+Sans+SC:wght@300;400;700&display=swap');
        body { background-color: #f9f9f7; color: #1a1a1a; font-family: 'Noto Sans SC', sans-serif; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .masonry-grid { column-gap: 1.5rem; display: block; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        .stone-card { break-inside: avoid; margin-bottom: 1.5rem; background: white; border-radius: 2.5rem; border: 1px solid #f0f0f0; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); overflow: hidden; }
        .stone-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); border-color: #e0e0e0; }
        .drop-zone-active { border-color: #000 !important; background: #fff !important; transform: scale(1.005); }
    </style>
</head>
<body class="pb-40 px-6">

    <div class="max-w-6xl mx-auto pt-16">
        <header class="mb-16 flex justify-between items-start">
            <div class="animate-in fade-in slide-in-from-left-4 duration-1000">
                <h1 class="text-5xl font-light tracking-tighter serif">灵感石碑</h1>
                <p class="text-[10px] text-stone-400 mt-3 uppercase tracking-[0.6em] font-bold">Monolith / v7.2 Final Stability</p>
            </div>
            <div class="flex gap-3">
                <button id="shakeJar" class="w-14 h-14 bg-stone-900 text-white rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-xl">
                    <i class="fa-solid fa-bolt-lightning"></i>
                </button>
                <button id="configBtn" class="w-14 h-14 bg-white text-stone-300 rounded-2xl flex items-center justify-center border border-stone-100 hover:text-stone-900 transition-all">
                    <i class="fa-solid fa-ellipsis"></i>
                </button>
            </div>
        </header>

        <!-- 交互区域 -->
        <div id="dropZone" class="group relative border-2 border-dashed border-stone-200 bg-white/40 rounded-[3rem] p-20 text-center transition-all cursor-pointer hover:border-stone-400 hover:bg-white min-h-[300px] flex flex-col justify-center items-center">
            <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer z-10" accept="image/*">
            <div class="space-y-6 pointer-events-none">
                <div class="w-20 h-20 bg-stone-100 rounded-full mx-auto flex items-center justify-center group-hover:rotate-12 transition-transform duration-500">
                    <i class="fa-solid fa-plus text-stone-400 text-2xl"></i>
                </div>
                <div class="space-y-2">
                    <p class="text-sm font-bold text-stone-600 tracking-widest uppercase">点击或拖入视觉碎片</p>
                    <p class="text-[10px] text-stone-300 uppercase tracking-widest italic">支持直接粘贴剪贴板图片</p>
                </div>
            </div>
        </div>

        <!-- 瀑布流 -->
        <div id="monolithFlow" class="masonry-grid mt-20"></div>
    </div>

    <!-- 预览面板 -->
    <div id="previewPanel" class="hidden fixed inset-0 z-[100] bg-stone-950/40 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-6xl rounded-[3.5rem] overflow-hidden shadow-2xl flex flex-col md:row h-[85vh] animate-in zoom-in-95 duration-300">
            <div class="w-full md:w-3/5 bg-stone-50 flex items-center justify-center p-8">
                <img id="previewImg" class="max-w-full max-h-full object-contain rounded-2xl shadow-lg">
                <div id="loadingOverlay" class="absolute inset-0 bg-white/90 flex flex-col items-center justify-center hidden">
                    <div class="w-12 h-12 border-2 border-stone-900 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] text-stone-400">正在刻录灵感基因...</p>
                </div>
            </div>
            <div class="w-full md:w-2/5 p-12 flex flex-col justify-between border-l border-stone-50">
                <div id="aiContent" class="space-y-10"></div>
                <div class="flex gap-4">
                    <button id="saveBtn" class="flex-1 bg-stone-900 text-white text-[11px] font-bold py-6 rounded-3xl hover:bg-stone-800 transition-all uppercase tracking-widest disabled:opacity-30">保存至石碑</button>
                    <button id="cancelBtn" class="px-10 bg-stone-100 text-stone-400 rounded-3xl text-[11px] font-bold uppercase tracking-widest">放弃</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 配置弹窗 -->
    <div id="configModal" class="fixed inset-0 z-[200] hidden bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-12 rounded-[3rem] w-full max-w-md shadow-2xl">
            <h3 class="text-xs font-black mb-8 uppercase tracking-widest text-stone-900">API 配置中心</h3>
            <input type="password" id="apiKeyInput" placeholder="输入 Gemini API Key" class="w-full bg-stone-50 border-none rounded-2xl py-5 px-8 text-sm mb-8 focus:ring-2 ring-stone-200 outline-none transition-all">
            <button id="saveConfig" class="w-full bg-stone-900 text-white py-5 rounded-2xl text-[11px] font-bold uppercase tracking-widest shadow-xl">保存并应用</button>
        </div>
    </div>

    <!-- 随机碰撞 -->
    <div id="jarPanel" class="hidden fixed inset-0 z-[150] bg-stone-900/40 backdrop-blur-3xl flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xl rounded-[3.5rem] p-12 shadow-2xl relative overflow-hidden text-center">
            <button id="closeJar" class="absolute top-8 right-8 text-stone-300 hover:text-stone-900 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div id="jarContent"></div>
            <button id="reShake" class="mt-12 w-full py-6 bg-stone-50 rounded-3xl text-stone-400 text-[10px] font-black uppercase tracking-[0.3em] hover:bg-stone-100 transition-all">再次碰撞</button>
        </div>
    </div>

    <script type="module">
        let currentFragment = { src: '', type: 'url', analysis: null };
        let allFragments = [];

        window.addEventListener('app-ready', () => {
            initApp();
            listenData();
        });

        function initApp() {
            // 基础配置
            document.getElementById('configBtn').onclick = () => {
                document.getElementById('configModal').classList.remove('hidden');
                document.getElementById('apiKeyInput').value = localStorage.getItem('GEMINI_API_KEY') || "";
            };
            document.getElementById('saveConfig').onclick = () => {
                localStorage.setItem('GEMINI_API_KEY', document.getElementById('apiKeyInput').value.trim());
                document.getElementById('configModal').classList.add('hidden');
            };

            // 全局拖拽拦截
            window.addEventListener('dragover', e => e.preventDefault());
            window.addEventListener('drop', e => e.preventDefault());

            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('dragover', () => dropZone.classList.add('drop-zone-active'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-zone-active'));
            dropZone.addEventListener('drop', handleDrop);

            // 粘贴支持
            window.addEventListener('paste', e => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.includes('image')) {
                        const file = item.getAsFile();
                        readAndProcess(file);
                    }
                }
            });

            document.getElementById('fileInput').onchange = e => {
                if (e.target.files[0]) readAndProcess(e.target.files[0]);
            };

            document.getElementById('cancelBtn').onclick = () => document.getElementById('previewPanel').classList.add('hidden');
            document.getElementById('saveBtn').onclick = saveToCloud;
            document.getElementById('shakeJar').onclick = showJar;
            document.getElementById('closeJar').onclick = () => document.getElementById('jarPanel').classList.add('hidden');
            document.getElementById('reShake').onclick = showJar;
        }

        function readAndProcess(file) {
            const reader = new FileReader();
            reader.onload = e => processInput(e.target.result, 'local');
            reader.readAsDataURL(file);
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.remove('drop-zone-active');
            const file = e.dataTransfer.files[0];
            if (file) {
                readAndProcess(file);
            } else {
                const text = e.dataTransfer.getData('text/plain');
                if (text && text.startsWith('http')) processInput(text, 'url');
            }
        }

        async function processInput(src, type) {
            currentFragment = { src, type, analysis: null };
            document.getElementById('previewImg').src = src;
            document.getElementById('previewPanel').classList.remove('hidden');
            document.getElementById('aiContent').innerHTML = "";
            document.getElementById('saveBtn').disabled = true;
            await runVisionAI(src, type);
        }

        async function runVisionAI(src, type) {
            const key = localStorage.getItem('GEMINI_API_KEY');
            if (!key) return alert("请在右上角菜单中配置 API Key");

            const loader = document.getElementById('loadingOverlay');
            loader.classList.remove('hidden');

            try {
                let base64 = "";
                if (type === 'local') {
                    base64 = src.split(',')[1];
                } else {
                    const resp = await fetch(src);
                    const blob = await resp.blob();
                    base64 = await new Promise(r => {
                        const rd = new FileReader();
                        rd.onloadend = () => r(rd.result.split(',')[1]);
                        rd.readAsDataURL(blob);
                    });
                }

                const prompt = `分析图像并返回JSON格式（不要Markdown）：{"tone":"视觉基调(15字内)","meta":"构图隐喻(15字内)","mood":"核心情绪","colors":["#HEX"],"tags":["标签1","标签2"]}`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await res.json();
                const analysis = JSON.parse(data.candidates[0].content.parts[0].text);
                currentFragment.analysis = analysis;

                document.getElementById('aiContent').innerHTML = `
                    <div class="animate-in slide-in-from-bottom-8 duration-700 space-y-10">
                        <div class="flex gap-2">
                            ${analysis.colors.map(c => `<div class="w-10 h-10 rounded-xl shadow-inner border border-stone-50" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="space-y-2">
                            <p class="text-[9px] font-black uppercase text-stone-300 tracking-[0.4em]">视觉基调</p>
                            <p class="text-xl serif text-stone-800 leading-tight">${analysis.tone}</p>
                        </div>
                        <div class="space-y-2">
                            <p class="text-[9px] font-black uppercase text-stone-300 tracking-[0.4em]">构图隐喻</p>
                            <p class="text-sm text-stone-500 serif italic">${analysis.meta}</p>
                        </div>
                        <div class="flex flex-wrap gap-2 pt-6 border-t border-stone-50">
                            ${analysis.tags.map(t => `<span class="bg-stone-50 text-stone-400 text-[9px] px-5 py-2 rounded-full font-black uppercase tracking-widest">#${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                document.getElementById('saveBtn').disabled = false;
            } catch (e) {
                document.getElementById('aiContent').innerHTML = `<p class="text-stone-300 text-xs italic">当前图片由于跨域限制无法直接解析，建议尝试右键“复制图片”后在此页面粘贴。</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function saveToCloud() {
            const { db, storage, appId, ref, uploadString, getDownloadURL, collection, addDoc } = window.fb;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "正在同步...";
            btn.disabled = true;

            try {
                let url = currentFragment.src;
                if (currentFragment.type === 'local') {
                    const sRef = ref(storage, `stones_v7_2/${Date.now()}.jpg`);
                    await uploadString(sRef, currentFragment.src, 'data_url');
                    url = await getDownloadURL(sRef);
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'stones_v7_final'), {
                    url,
                    analysis: currentFragment.analysis,
                    createdAt: Date.now(),
                    uid: window.currentUser.uid
                });
                document.getElementById('previewPanel').classList.add('hidden');
            } catch (e) {
                alert("保存失败: " + e.message);
            } finally {
                btn.innerText = "保存至石碑";
                btn.disabled = false;
            }
        }

        function listenData() {
            const { db, appId, collection, onSnapshot } = window.fb;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stones_v7_final'), (snap) => {
                const flow = document.getElementById('monolithFlow');
                allFragments = snap.docs.map(doc => doc.data()).sort((a,b) => b.createdAt - a.createdAt);
                
                if (allFragments.length === 0) {
                    flow.innerHTML = `<div class="col-span-full py-60 text-center text-stone-200 text-[10px] font-black uppercase tracking-[0.8em]">石碑无声，等待第一束光</div>`;
                    return;
                }

                flow.innerHTML = allFragments.map(item => `
                    <div class="stone-card group">
                        <div class="relative overflow-hidden aspect-[4/5] bg-stone-50">
                            <img src="${item.url}" class="w-full h-full object-cover transition-all duration-1000 group-hover:scale-105" loading="lazy">
                            <div class="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black/20 to-transparent flex gap-1">
                                ${item.analysis.colors.map(c => `<div class="w-2 h-2 rounded-full border border-white/20" style="background:${c}"></div>`).join('')}
                            </div>
                        </div>
                        <div class="p-8 space-y-4">
                            <p class="text-[13px] text-stone-700 serif leading-relaxed line-clamp-2">${item.analysis.tone}</p>
                            <div class="flex gap-2">
                                <span class="text-[8px] font-black text-stone-300 uppercase tracking-widest">${item.analysis.tags[0] || 'Inspo'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
        }

        function showJar() {
            if (allFragments.length < 2) return alert("素材不足 2 片，无法产生碰撞。");
            const panel = document.getElementById('jarPanel');
            const content = document.getElementById('jarContent');
            panel.classList.remove('hidden');

            const shuffled = [...allFragments].sort(() => 0.5 - Math.random());
            const a = shuffled[0], b = shuffled[1];

            content.innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <img src="${a.url}" class="aspect-square rounded-[2rem] object-cover shadow-2xl scale-95 hover:scale-100 transition-transform">
                    <img src="${b.url}" class="aspect-square rounded-[2rem] object-cover shadow-2xl scale-95 hover:scale-100 transition-transform">
                </div>
                <div class="space-y-6">
                    <h2 class="serif text-2xl text-stone-800 leading-tight">
                        在 <span class="text-stone-400">“${a.analysis.mood}”</span> 的余温里，<br>嵌入 <span class="text-stone-400">“${b.analysis.tone}”</span> 的锋芒。
                    </h2>
                    <p class="text-[9px] font-black text-stone-300 uppercase tracking-[0.4em]">碰撞命题已生成</p>
                </div>
            `;
        }
    </script>
</body>
</html>
